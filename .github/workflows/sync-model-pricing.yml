name: 同步模型价格数据

on:
  schedule:
    - cron: '7 * * * *'
    - cron: '17 * * * *'
    - cron: '27 * * * *'
    - cron: '37 * * * *'
    - cron: '47 * * * *'
    - cron: '57 * * * *'
  workflow_dispatch: {}

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  sync-pricing:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: 检出工具代码
        uses: actions/checkout@v4
        with:
          path: source
          fetch-depth: 1

      - name: 检出 price-mirror 分支
        uses: actions/checkout@v4
        with:
          ref: price-mirror
          path: price-mirror
          fetch-depth: 0

      - name: 设置 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: source/package-lock.json

      - name: 安装工具依赖
        working-directory: source
        run: npm ci --ignore-scripts

      - name: 准备默认运行配置
        working-directory: source
        run: cp config/config.example.js config/config.js

      - name: 生成价格镜像文件
        id: fetch
        working-directory: source
        env:
          PRICE_MIRROR_OUTPUT_DIR: ${{ github.workspace }}/price-mirror
        run: |
          set -euo pipefail
          node scripts/update-model-pricing.js --mirror --output-dir "$PRICE_MIRROR_OUTPUT_DIR"

          cd "$PRICE_MIRROR_OUTPUT_DIR"
          if git diff --quiet -- model_prices_and_context_window.json model_prices_and_context_window.sha256; then
            echo "价格镜像无变化，跳过提交"
            echo "changed=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          NEW_HASH=$(cat model_prices_and_context_window.sha256 | tr -d ' \n\r')

          echo "changed=true" >> "$GITHUB_OUTPUT"
          echo "hash=$NEW_HASH" >> "$GITHUB_OUTPUT"

      - name: 提交并推送变更
        if: steps.fetch.outputs.changed == 'true'
        working-directory: price-mirror
        env:
          NEW_HASH: ${{ steps.fetch.outputs.hash }}
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add model_prices_and_context_window.json model_prices_and_context_window.sha256
          COMMIT_MSG="chore: 同步模型价格数据"
          if [ -n "${NEW_HASH}" ]; then
            COMMIT_MSG="$COMMIT_MSG (${NEW_HASH})"
          fi
          git commit -m "$COMMIT_MSG"
          git push origin price-mirror
